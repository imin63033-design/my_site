<!DOCTYPE html>
<html>

<head>
    <title>EduMate - Your AI Learning Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🎓 EduMate</h1>
            <p>Your personal AI learning assistant</p>
        </header>

        <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message bot-message">
                    Hi! I'm EduMate. How can I help you learn today?
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask me anything about learning...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
